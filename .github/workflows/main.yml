name: Varredura Diaria de Swing Trade

on:
  schedule:
    # Roda de segunda a sexta às 18:30 BRT (21:30 UTC)
    - cron: '30 21 * * 1-5'
  workflow_dispatch: # Permite que você force a execução clicando em um botão no GitHub

jobs:
  scanner:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar codigo do repositorio
        uses: actions/checkout@v3

      - name: Configurar o Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install pandas yfinance

      - name: Executar o Scanner
        run: python scanner.py

      - name: Salvar resultados no repositorio (Commit & Push)
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add resultados/oportunidades.csv
          # Comita apenas se houver alterações para não gerar erros
          git diff --quiet && git diff --staged --quiet || (git commit -m "Atualização diária de oportunidades: $(date +'%Y-%m-%d')" && git push)
